<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cyber News Pipeline — Secure Admin Login">
  <title>Login — Cyber News Pipeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <!-- Animated Background Grid -->
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <main class="login-container">
    <div class="login-card">
      <!-- Logo/Branding -->
      <div class="login-header">
        <div class="logo-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="22" stroke="url(#grad1)" stroke-width="2" fill="none"/>
            <path d="M24 8 L24 40 M12 16 L36 16 M12 32 L36 32 M14 24 L34 24" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
            <circle cx="24" cy="24" r="6" fill="url(#grad1)" opacity="0.8"/>
            <circle cx="24" cy="24" r="3" fill="#0a0e27"/>
            <circle cx="24" cy="16" r="2" fill="#00d4ff" opacity="0.6"/>
            <circle cx="24" cy="32" r="2" fill="#00ff88" opacity="0.6"/>
            <circle cx="16" cy="24" r="2" fill="#00d4ff" opacity="0.4"/>
            <circle cx="32" cy="24" r="2" fill="#00ff88" opacity="0.4"/>
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48">
                <stop offset="0%" stop-color="#00d4ff"/>
                <stop offset="100%" stop-color="#00ff88"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>Cyber News Pipeline</h1>
        <p class="subtitle">Admin Control Panel</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="login-form" autocomplete="off">
        <div class="input-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-open">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-closed" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="errorMessage" class="error-message" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span></span>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" style="display:none">
            <span class="spinner"></span>
            Authenticating...
          </span>
        </button>
      </form>

      <div class="login-footer">
        <div class="secure-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>Secured Session</span>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Particle animation
    const particlesEl = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 6 + 's';
      p.style.animationDuration = (4 + Math.random() * 6) + 's';
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      particlesEl.appendChild(p);
    }

    // Toggle password visibility
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      toggleBtn.querySelector('.eye-open').style.display = isPassword ? 'none' : 'block';
      toggleBtn.querySelector('.eye-closed').style.display = isPassword ? 'block' : 'none';
    });

    // Login form
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorDiv.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please fill in all fields');
        return;
      }

      // Show loading state
      loginBtn.querySelector('.btn-text').style.display = 'none';
      loginBtn.querySelector('.btn-loader').style.display = 'flex';
      loginBtn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          loginBtn.classList.add('success');
          loginBtn.querySelector('.btn-loader').innerHTML = '<span>✓ Access Granted</span>';
          setTimeout(() => {
            window.location.href = '/';
          }, 800);
        } else {
          showError(data.error || 'Invalid credentials');
          resetButton();
        }
      } catch (err) {
        showError('Connection failed. Is the server running?');
        resetButton();
      }
    });

    function showError(msg) {
      errorDiv.querySelector('span').textContent = msg;
      errorDiv.style.display = 'flex';
      errorDiv.classList.add('shake');
      setTimeout(() => errorDiv.classList.remove('shake'), 500);
    }

    function resetButton() {
      loginBtn.querySelector('.btn-text').style.display = 'inline';
      loginBtn.querySelector('.btn-loader').style.display = 'none';
      loginBtn.disabled = false;
      loginBtn.classList.remove('success');
    }
  </script>
</body>
</html>
