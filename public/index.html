<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber News Pipeline — Latest Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/index.css">
  <style>
    .public-layout {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px;
      min-height: calc(100vh - 64px);
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>

  <!-- ─── Top Navigation ──────────────────────────────────── -->

  <header class="top-bar">
    <div class="top-bar-left">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="14" stroke="url(#hGrad)" stroke-width="1.5" fill="none" />
            <circle cx="16" cy="16" r="4" fill="url(#hGrad)" opacity="0.8" />
            <circle cx="16" cy="16" r="2" fill="#0a0e27" />
            <defs>
              <linearGradient id="hGrad" x1="0" y1="0" x2="32" y2="32">
                <stop offset="0%" stop-color="#00d4ff" />
                <stop offset="100%" stop-color="#00ff88" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1 class="brand-title">Cyber News Pipeline</h1>
          <span class="brand-sub">Latest Intelligence (Public)</span>
        </div>
      </div>
    </div>
    <nav class="nav-links">
      <a href="/" class="nav-item">Home</a>
      <a href="/about.html" class="nav-item">About</a>
      <a href="/contact.html" class="nav-item">Contact</a>
    </nav>

    <div class="top-bar-right">
      <a href="/login.html" class="btn-outline">
        Admin Login
      </a>
    </div>
  </header>

  <main class="public-layout">
    <!-- Hero Section -->
    <section class="hero">
      <h1 class="hero-title">Welcome to the Cyber News Pipeline</h1>
      <p class="hero-subtitle">Your daily source of curated cyber‑security intelligence.</p>
    </section>

    <!-- Hot News Section (highlights) -->
    <section class="hot-news">
      <h2 class="section-heading">Hot News</h2>
      <div class="hot-news-grid" id="hotNewsGrid"></div>
    </section>

    <div class="articles-grid" id="publicGrid">
      <div class="loading-state" id="loadingState">
        <div class="cyber-loader">
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
        </div>
        <p>Loading intelligence feed...</p>
      </div>
    </div>
  </main>

  <script src="/public.js"></script>
</body>

</html>
